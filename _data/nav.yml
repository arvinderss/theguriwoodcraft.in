# ============================================================================
#  NAVIGATION + UI LABELS — the ONE place you edit menus and translations.
#  Add a menu item here → it appears in the header AND footer on EVERY page,
#  in all three languages. This is your build_nav.py equivalent, but declarative.
#
#  To add a page to the menu: copy a block under `menu:` and fill the three
#  language labels + the url. To rename a menu item in Punjabi only, edit just
#  that one `pa:` line. Nothing else to touch.
# ============================================================================

